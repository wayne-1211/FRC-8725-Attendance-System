<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#121212" />
  <title>Attendance System</title>
  <meta name="description" content="Misty Panther · Workshop" />
  <meta property="og:title" content="Attendance System" />
  <meta property="og:description" content="Misty Panther · Workshop" />
  <link rel="icon" type="image/png" href="images/brand/team-logo.png" />

  <!-- PWA: manifest + icons -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="images/icons/pwa/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="images/icons/pwa/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="images/icons/pwa/icon-512.png" />

  <!-- PWA: standalone install behaviour on iOS Safari -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Team 8725" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/attendance.css" />
</head>
<body>
  <div class="app">
    <nav class="side-nav" aria-label="主導覽">
      <div class="brand">
        <img class="brand-mark" id="brand-mark" src="images/brand/team-logo.png" alt="隊徽" />
        <div class="brand-text">
          <div class="brand-name" id="brand-name">Team 8725</div>
          <div class="brand-sub" id="brand-sub">Misty Panther · Workshop</div>
        </div>
      </div>
      <div class="nav-group" id="primary-nav"></div>
      <div class="nav-spacer"></div>
      <div id="account-host"></div>
    </nav>
    <main class="main" id="page-outlet" aria-live="polite"></main>
  </div>

  <script type="module" src="js/core/main.js"></script>
  <script>
    // Register the service worker for offline support / installability.
    // Uses a relative path + scope so it works both at a domain root and at
    // a GitHub Pages project subpath (e.g. /FRC8725-Attendance-System/).
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const swUrl = new URL('service-worker.js', document.baseURI);
        navigator.serviceWorker.register(swUrl, { scope: './' }).catch((err) => {
          console.error('Service worker registration failed', err);
        });
      });
    }
  </script>
</body>
</html>
